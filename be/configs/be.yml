# 如果需要将 YAML 转换为 Go 结构体，请执行命令：make update-config

# 应用设置
app:
  name: "be"      # 服务器名称
  env: "dev"                     # 运行环境，dev: 开发环境, prod: 生产环境, test: 测试环境
  version: "v0.0.0"
  host: "127.0.0.1"              # 域名或IP，用于服务注册
  enableStat: true               # 是否开启打印统计信息，true:开启, false:关闭
  enableMetrics: true            # 是否开启指标采集，true:开启, false:关闭
  enableHTTPProfile: false       # 是否开启性能分析，true:开启, false:关闭
  enableLimit: false             # 是否开启限流（自适应），true:开启, false:关闭
  enableCircuitBreaker: false    # 是否开启熔断（自适应），true:开启, false:关闭
  enableTrace: false             # 是否开启链路追踪，true:开启, false:关闭，如果为true必须配置jaeger
  tracingSamplingRate: 1.0       # 追踪采样率，取值范围0到1，0表示不采样，1表示采样所有链路
  #registryDiscoveryType: ""      # 注册和发现类型：consul、etcd、nacos，如果为空，则不使用注册和发现功能
  cacheType: "redis"                  # 缓存类型，如果为空，则不使用缓存，支持 "memory" 和 "redis"，如果设置为 redis，则必须配置 redis 设置


# HTTP 服务器设置
http:
  port: 8080                # 监听端口
  timeout: 0                 # 请求超时，单位：秒，如果为0表示不设置，大于0表示设置超时，如果启用了 enableHTTPProfile，则需要设置为0或大于60秒
  tls:
    # TLS 模式选项:
    #   self-signed  - 使用本地自签名证书
    #   encrypt      - 使用 Let's Encrypt（需要域名和邮箱）
    #   external     - 使用外部证书（需要 certFile 和 keyFile）
    enableMode: ""
    domain: ""        # 如果 enableMode = encrypt，则为必填项
    email: ""         # 如果 enableMode = encrypt，则为必填项
    certFile: ""      # 如果 enableMode = external，则为必填项，证书文件的绝对路径
    keyFile: ""       # 如果 enableMode = external，则为必填项，密钥文件的绝对路径



# 日志设置
logger:
  level: "info"             # 输出日志级别 debug、info、warn、error，默认为 debug
  format: "console"         # 输出格式，console 或 json，默认为 console
  isSave: false             # false:输出到终端，true:输出到文件，默认为 false
    #logFileConfig:           # 当 isSave=true 时生效
    #filename: "out.log"    # 文件名（默认 out.log）
    #maxSize: 20            # 最大文件大小（MB，默认 10MB）
    #maxBackups: 50         # 最大保留旧文件数量（默认 100）
    #maxAge: 15             # 保留旧文件的最大天数（默认 30 天）
  #isCompression: true    # 是否压缩/归档旧文件（默认 false）


# 数据库设置
database:
  driver: "mysql"           # 数据库驱动
  # MySQL 设置
  mysql:
    # DSN 格式：<用户名>:<密码>@(<主机>:<端口>)/<数据库>?[参数=值&...]
    dsn: "root:111111@(127.0.0.1:3306)/polymarket_ai?parseTime=true&loc=Asia%2FShanghai&charset=utf8mb4&collation=utf8mb4_general_ci"
    enableLog: true         # 是否开启打印所有 SQL 日志
    maxIdleConns: 10        # 设置空闲连接池中的最大连接数
    maxOpenConns: 100       # 设置数据库的最大打开连接数
    connMaxLifetime: 30     # 设置连接可重用的最大时间，单位：分钟
    #slavesDsn:             # 设置从库 MySQL DSN，数组类型
    #  - "你的从库 DSN 1"
    #  - "你的从库 DSN 2"
    #mastersDsn:            # 设置主库 MySQL DSN，数组类型，非必填字段，如果只有一个主库，无需设置 mastersDsn 字段，默认 dsn 字段即为主库。
    #  - "你的主库 DSN"


# Redis 设置
redis:
  # DSN 格式：[用户名]:<密码>@127.0.0.1:6379/[数据库]，默认用户为 default，仅 Redis 6.0 及以上版本支持用户名。
  dsn: "default:111111@127.0.0.1:6379/0"
  dialTimeout: 10           # 连接超时，单位：秒
  readTimeout: 2            # 读取超时，单位：秒
  writeTimeout: 2           # 写入超时，单位：秒
  keyPrefix: "be_"          # Redis 键前缀，所有键都会加上此前缀


# JWT 设置
jwt:
  signKey: "polymarket-ai-jwt-secret-key"
  expireTime: 72               # token 有效期，单位：小时
  issuer: "polymarket-ai"

# Jaeger 设置
#当前没开启 需要app.enableTrace 为true 开启需要先安装jaeger
jaeger:
  agentHost: "127.0.0.1"
  agentPort: 6831

# 代理设置（可选），配置后所有外部 API 请求将通过此代理
#主要走代理的服务 fearGreedIndex polymarket binance  gnews  cryptoquant
proxy:
  addr: "127.0.0.1:6450"

# 恐慌贪婪指数 API 地址
fearGreedIndex:
  url: "https://api.alternative.me/fng/"

# DeepSeek AI 配置
deepseek:
  # DeepSeek API Key 当前通过环境变量读取 也可以直接设置 "你的key"
  apiKey: "${DEEPSEEK_API_KEY}"
  baseURL: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  # true=使用 DeepAgent 多智能体架构, false=使用传统单模型
  useAgentPredictor: true

# Polymarket 设置
polymarket:
  clobApiUrl: "https://clob.polymarket.com"
  gammaApiUrl: "https://gamma-api.polymarket.com"
  chainId: 137
  #注册polymarket签名的钱包的私钥 (主要用于下单)  （环境变量）也可以直接设置值
  privateKey: "${POLYMARKET_PRIVATE_KEY}"
  #polymarket开发者的API key （环境变量）也可以直接设置值
  apiKey: "${POLYMARKET_API_KEY}"
  #polymarket开发者的API secret （环境变量）也可以直接设置值
  apiSecret: "${POLYMARKET_API_SECRET}"
  #polymarket开发者的API passphrase （环境变量）也可以直接设置值
  passphrase: "${POLYMARKET_PASSPHRASE}"
  # WebSocket 设置（实时盘口）
  wsMarketUrl: "wss://ws-subscriptions-clob.polymarket.com/ws/market"

# Binance 设置
binance:
  apiUrl: "https://api.binance.com"

# GNews 设置（替换 CryptoPanic 作为新闻源）
# GNews API 文档: https://gnews.io/docs
#https://gnews.io/api/v4/search?q=Bitcoin&lang=en&country=us&max=10&apikey=xxxx
gnews:
  baseUrl: "https://gnews.io/api/v4/search"
  apiKey: "${GNEWS_API_KEY}"  #（环境变量）也可以直接设置值

# 链上数据设置
cryptoquant:
  apiKey: "${CRYPTO_QUANT_API_KEY}"  #（环境变量）也可以直接设置值
  baseUrl: "https://api.cryptoquant.com/v1/" 

# 策略设置
strategy:
  minEdge: 0.25
  minConfidence: 0.6
  maxPositionPct: 0.10
  kellyMultiplier: 0.5
  takeProfitFactor: 0.7
  stopLossFactor: 0.5
  preResolutionMinutes: 30

# 监控设置
monitoring:
  priceCheckInterval: 10
  alertPriceChangePct: 10
  maxRetry: 3

# Asynq 设置
asynq:
  addr: "127.0.0.1:6379"
  password: "111111"
  db: 1
  concurrency: 10

# PolyVault 金库合约设置
vault:
  rpcUrl: "http://127.0.0.1:8545/"           # Polygon主网RPC
  contractAddress: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"                           # 已部署的PolyVault合约地址(需部署后填写)
  strategistPrivateKey: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"  # 策略角色私钥（环境变量）